                        description: Cached image URL
                        type: string
                        example: https://ipfs.io/ipfs/QmZMqhh2ztwuZ3Y8PyEp2z5auyH3TCm3nnr5ZfjjgDjd5q/12199.png
                      cached_thumbnail_image:
                        format: uri
                        description: Cached image URL
                        type: string
                        example: https://ipfs.io/ipfs/QmZMqhh2ztwuZ3Y8PyEp2z5auyH3TCm3nnr5ZfjjgDjd5q/12199.png
                      attributes:
                        type: array
                        items:
                          title: Metadata Attribute
                          type: object
                          properties:
                            trait_type:
                              type: string
                              example: Background
                            display_type:
                              type: string
                              example: string
                            value:
                              title: Metadata Value
                              example: value
                          required:
                            - trait_type
                            - value
                      properties:
                        title: Metadata Properties
                        type: object
                        additionalProperties:
                          title: Metadata Value
                          examples:
                            - value
                        example:
                          collection: Foo Collection
                          total_supply: "10000"
                      localization:
                        title: Metadata Localization
                        type: object
                        properties:
                          uri:
                            format: uri
                            type: string
                            example: http://token.com/metadata?hl={locale}
                          default:
                            type: string
                            example: en
                          locales:
                            type: array
                            items:
                              type: string
                            example:
                              - en
                              - jp
                        required:
                          - uri
                          - default
                          - locales
                    required:
                      - sip
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                title: Not Found Error Response
                anyOf:
                  - title: Token Not Found Response
                    type: object
                    properties:
                      error:
                        type: string
                        enum:
                          - Token not found
                    required:
                      - error
                  - title: Contract Not Found Response
                    type: object
                    properties:
                      error:
                        type: string
                        enum:
                          - Contract not found
                    required:
                      - error
        "422":
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                anyOf:
                  - title: Token Metadata Fetch In Progress Response
                    type: object
                    properties:
                      error:
                        type: string
                        enum:
                          - Token metadata fetch in progress
                    required:
                      - error
                  - title: Locale Not Found Response
                    type: object
                    properties:
                      error:
                        type: string
                        enum:
                          - Locale not found
                    required:
                      - error
                  - type: object
                    properties:
                      error:
                        type: string
