  /metadata/v1/search:
    get:
      operationId: searchTokens
      summary: Search Tokens
      tags:
        - Tokens
      description: Retrieves metadata for multiple tokens in a single request. Accepts
        up to 50 contract identifiers.
      parameters:
        - schema:
            minItems: 1
            maxItems: 50
            title: Contract Identifiers
            type: array
            items:
              title: Contract Identifier
              description: "Format: PRINCIPAL or PRINCIPAL:TOKEN_NUMBER"
              examples:
                - SP32XCD69XPS3GKDEXAQ29PJRDSD5AR643GNEEBXZ.fari-token
                - SP497E7RX3233ATBS2AB9G4WTHB63X5PBSP5VGAQ.boomboxes-cycle-12:120
              type: string
              pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}\.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}(:\d+)?$
          in: query
          name: contract
          required: true
          description: "Contract identifiers to search for. Format: PRINCIPAL or
            PRINCIPAL:TOKEN_NUMBER. Defaults token_number to 1 when omitted."
        - schema:
            title: Localization
            type: string
          examples:
            es-MX:
              value: es-MX
            jp:
              value: jp
          in: query
          name: locale
          required: false
          description: Metadata localization to retrieve
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                title: Search Response
                type: array
                items:
                  title: Search Result Item
                  type: object
                  properties:
                    contract_id:
                      description: Contract principal
                      type: string
                      example: SP32XCD69XPS3GKDEXAQ29PJRDSD5AR643GNEEBXZ.fari-token
                    token_number:
                      description: Token number
                      type: integer
                      example: 1
                    token_type:
                      description: Token type (ft, nft, sft)
                      type: string
                      example: ft
                    name:
                      type: string
                      example: Wrapped USD
                    symbol:
                      type: string
                      example: xUSD
                    decimals:
                      type: integer
                      example: 8
                    total_supply:
                      type: string
                      example: "9999980000000"
                    token_uri:
                      format: uri
                      description: URI for this token's metadata JSON
                      type: string
                      example: ipfs://ipfs/Qmf9yDYuPTrp8NRUFf8xxDd5Ud24Dx9uYMwMn8o8G2cWPW/12200.json
                    description:
                      description: Description
                      type: string
                      example: Heavy hitters, all-stars and legends of the game join forces to create
                        a collection of unique varsity jackets
                    image_uri:
                      format: uri
                      description: Cached image URL
                      type: string
                      example: https://ipfs.io/ipfs/QmZMqhh2ztwuZ3Y8PyEp2z5auyH3TCm3nnr5ZfjjgDjd5q/12199.png
                    image_thumbnail_uri:
                      format: uri
                      description: Cached image URL
                      type: string
                      example: https://ipfs.io/ipfs/QmZMqhh2ztwuZ3Y8PyEp2z5auyH3TCm3nnr5ZfjjgDjd5q/12199.png
                    image_canonical_uri:
                      format: uri
                      description: Original image URL
                      type: string
                      example: ipfs://ipfs/QmZMqhh2ztwuZ3Y8PyEp2z5auyH3TCm3nnr5ZfjjgDjd5q/12199.png
                    tx_id:
                      description: Transaction ID of the contract deployment
                      type: string
                      example: "0x5642ca7d68976b6b2a2055689d9a57de26d67f0dd8b016d1b0d94cb634454cdd"
                    sender_address:
                      description: Deployer address
                      type: string
                      example: SPZA22A4D15RKH5G8XDGQ7BPC20Q5JNMH0VQKSR6
                  required:
                    - contract_id
                    - token_number
                    - token_type
                    - tx_id
                    - sender_address
  /metadata/v1/:
    get:
      operationId: getApiStatus
      summary: API Status
      tags:
        - Status
      description: Displays the status of the API
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                title: Api Status Response
                type: object
                properties:
                  server_version:
                    type: string
                    example: token-metadata-api v0.0.1 (master:a1b2c3)
                  status:
                    type: string
                    example: ready
                  chain_tip:
                    anyOf:
                      - type: object
                        properties:
                          block_height:
                            examples:
                              - 163541
                            type: integer
                          index_block_hash:
                            examples:
                              - "0x1234567890abcdef1234567890abcdef1234567890ab\
                                cdef"
                            type: string
                        required:
                          - block_height
                          - index_block_hash
                      - type: "null"
                required:
                  - server_version
                  - status
                  - chain_tip
